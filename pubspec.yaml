name: expense_log
description: A new Flutter expense log application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.2  # Critical for Linux desktop
  path: ^1.9.0
  intl: ^0.20.2
  fl_chart: ^1.2.0
  path_provider: ^2.1.1
  permission_handler: ^12.0.1
  share_plus: ^12.0.2  # Optional, for sharing files
  flutter_native_splash: ^2.3.8  # Faster splash screen
  cached_network_image: ^3.3.0   # If using images later

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_flipperkit: ^0.0.15   # For performance profiling (debug only)


flutter:
  uses-material-design: true
  assets: # Enable aggressive optimizations
    - assets/